<h2 id="面试过程"><a class="markdownIt-Anchor" href="#面试过程"></a> 面试过程</h2>
<p>面试过程因公司而异，其通常包括了至少一个编程面试（technical interview）和一个</p>
<!-- The Interview Process
The interview process varies depending on the company, but it usually includes at least one technical interview and one behavioral/cultural fit interview. Different companies will have slightly different flows and timelines and can range from a few weeks to as long as a few months. Some companies have recruiting cycles at different times of the year, while other companies recruit constantly.  Below is a sample of a common interview flow: -->
<!-- Resume Review -> Phone Screening -> Behavioral Interview -> Technical Interview -> Final Interview -->
<!-- Phone Screen: A short (15-30 minutes) phone call or video interview where a recruiter will ask about your experience and skills to see if you could be a good fit for the role. These interviews may also include questions to assess if you are a good culture fit for the organization. -->
<!-- Behavioral and Cultural Fit Interview: A panel or individual interviews with 2-3 different people. You may be asked case-based questions, like “tell me about a time when you had to solve a complex problem on a project and what were the steps you took to resolve the problem.” These interviews may also include situational/behavioral questions, like, “tell me a time when you had a conflict with a coworker and how you handled it.” -->
<!-- Technical Interview: Technical interviews are very common for roles requiring technical skills as part of the role, these interviews are utilized to assess your technical qualifications. This program will teach you more about technical interviews and how to prepare and practice them! -->
<!-- Final Round Interview: This interview is usually done by the hiring manager or someone from the hiring team to review your fit for the team and company at large. -->
<!-- What is important to understand about a company?
This question will differ from person to person because everyone has different priorities when it comes to working. Consider what is most important to you in a job, you can start your research to discover if what the company offers matches those priorities. Some priorities may include:  
    Opportunities to learn/train on new technical skills
    Opportunities to own projects/products end to end
    Clear opportunities to progress in your career within the company
    Monetary compensation

    The company’s mission, vision, and values

<h1 id="white-board-challenge"><a class="markdownIt-Anchor" href="#white-board-challenge"></a> White board challenge</h1>
<!-- As you dive into these practice technical interviews, remember that this course teaches you strategies on how to best approach technical interviews as part of the hiring process. After completing the program, you will receive all resources, including additional practice questions and resources to address any coding-specific questions you may have. In this task, you will learn about best practices when approaching a whiteboard challenge.

Whiteboard challenges or whiteboarding is a live coding or problem-solving interview session that often involves using the whiteboard (thus the name) to illustrate your thought process. It is a platform that allows you to present the logic of code rather than focus on syntax. Whiteboard challenges can look very different depending on the company. These interviews can be held in-person or virtually, and they can focus on coding or on broader problem-solving. 

For Whiteboard challenges, it is important to remember that these are conversations between you and an interviewer to understand how you think about developing a plan for solving problems. You may not create a perfect strategy on the first try, but your interviewer is looking for you to explain your thinking and showcase your approach, even if it’s incomplete. To help you do this, it can be helpful to utilize the UMPIRE strategy.

U: Understand the problem
M: Match the problem with the interviewer
P: Plan your approach and solution
I: Implement your solution
R: Review your solution
